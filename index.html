<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    
    <!-- 꼬리바람(Tailwind) CSS CDN: 스타일링을 위해 사용 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js CDN: 월별 평균 거래가격 차트를 그리기 위해 사용 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- PapaParse CDN: 구글 시트의 CSV 데이터를 쉽게 파싱하기 위해 사용 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- 사용자 정의 스타일 (반투명 카드 및 배경) -->
    <style>
        body {
            /* 부드러운 그라데이션 배경 적용 */
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }
        
        /* 반투명 카드 (Translucent / Semi-transparent) 및 둥근 모서리 스타일 정의 */
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem; /* 둥근 모서리 */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        /* 테이블 스크롤바 커스텀 */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-gray-800 font-sans p-4 md:p-8 flex flex-col items-center">

    <!-- 대시보드 전체 컨테이너 -->
    <div class="max-w-7xl w-full space-y-6">
        
        <!-- 대시보드 헤더 -->
        <header class="glass-card p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">우리 동네 아파트 실거래가 대시보드</h1>
                <p class="text-gray-500 mt-2 text-sm" id="update-status">데이터를 불러오는 중입니다...</p>
            </div>
            <!-- 장식용 아이콘 -->
            <div class="hidden md:block bg-blue-100 p-3 rounded-full text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </div>
        </header>

        <!-- 요약 정보 (전체 건수, 평균, 최고, 최저) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- 전체 거래 건수 카드 -->
            <div class="glass-card p-6 flex flex-col justify-center">
                <span class="text-gray-500 text-sm font-semibold mb-1">전체 거래 건수</span>
                <span class="text-3xl font-bold text-blue-600" id="total-count">- 건</span>
            </div>
            <!-- 평균 거래가격 카드 -->
            <div class="glass-card p-6 flex flex-col justify-center">
                <span class="text-gray-500 text-sm font-semibold mb-1">평균 거래가격</span>
                <span class="text-3xl font-bold text-green-600" id="avg-price">- 만원</span>
            </div>
            <!-- 최고 거래가격 카드 -->
            <div class="glass-card p-6 flex flex-col justify-center">
                <span class="text-gray-500 text-sm font-semibold mb-1">최고 거래가격</span>
                <span class="text-3xl font-bold text-red-500" id="max-price">- 만원</span>
            </div>
            <!-- 최저 거래가격 카드 -->
            <div class="glass-card p-6 flex flex-col justify-center">
                <span class="text-gray-500 text-sm font-semibold mb-1">최저 거래가격</span>
                <span class="text-3xl font-bold text-indigo-500" id="min-price">- 만원</span>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 (차트 & 테이블) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- 월별 평균 거래가격 차트 영역 -->
            <div class="glass-card p-6 lg:col-span-2">
                <h2 class="text-lg font-bold text-gray-700 mb-4">월별 평균 거래가격 추이</h2>
                <div class="relative h-[300px] w-full">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- 지역 및 면적 등 추가 요약 정보 (필요시 확장 가능) -->
            <div class="glass-card p-6 flex flex-col justify-center items-center text-center">
                <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
                <h3 class="text-gray-700 font-semibold mb-2">데이터 분석 안내</h3>
                <p class="text-sm text-gray-500 leading-relaxed">
                    본 대시보드는 실거래가 데이터를 바탕으로 작성되었습니다.<br>
                    우측 하단의 테이블에서 상세 거래 내역을 확인할 수 있습니다.
                </p>
            </div>
        </div>

        <!-- 거래 목록 테이블 영역 -->
        <div class="glass-card p-6 table-container overflow-hidden flex flex-col">
            <h2 class="text-lg font-bold text-gray-700 mb-4">최근 거래 목록</h2>
            <div class="overflow-x-auto max-h-[400px] overflow-y-auto rounded-xl">
                <table class="w-full text-left text-sm text-gray-600 border-collapse whitespace-nowrap">
                    <thead class="bg-gray-50/50 sticky top-0 backdrop-blur-sm z-10">
                        <tr>
                            <th class="p-3 font-semibold border-b border-gray-200">거래일자</th>
                            <th class="p-3 font-semibold border-b border-gray-200">아파트명</th>
                            <th class="p-3 font-semibold border-b border-gray-200">법정동</th>
                            <th class="p-3 font-semibold border-b border-gray-200 text-right">전용면적(㎡)</th>
                            <th class="p-3 font-semibold border-b border-gray-200 text-center">층</th>
                            <th class="p-3 font-semibold border-b border-gray-200 text-right text-blue-600">거래금액(만원)</th>
                            <th class="p-3 font-semibold border-b border-gray-200 text-center">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100">
                        <!-- 자바스크립트를 통해 테이블 로우가 여기에 추가됩니다. -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 푸터 영역 (요청하신 문구 반영) -->
        <footer class="w-full text-center text-sm text-gray-500 py-6">
            &copy; 2026 [더성장연구소]. All Rights Reserved.
        </footer>

    </div>

    <!-- 자바스크립트 로직 시작 -->
    <script>
        // 구글 시트 CSV 데이터 URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSrg_kRH5WJZLFHu05AVjZbOQC2SWAFwNRV3iXzdoLODz3uIuzKehUGAug82xHenexxDSMMua1kDL2N/pub?gid=0&single=true&output=csv';

        // 차트 객체를 저장할 전역 변수
        let myChart = null;

        // 숫자에 콤마를 찍어주는 함수
        const formatNumber = (num) => {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        };

        // 데이터 불러오기 및 처리 시작
        function initDashboard() {
            Papa.parse(CSV_URL, {
                download: true,       // URL에서 직접 다운로드
                header: true,         // 첫 줄을 헤더(키값)로 사용
                skipEmptyLines: true, // 빈 줄 무시
                complete: function(results) {
                    const rawData = results.data;
                    
                    if(rawData.length === 0) {
                        document.getElementById('update-status').innerText = '데이터를 불러오지 못했습니다.';
                        return;
                    }

                    // 데이터 정제 과정 (필요한 컬럼 추출 및 숫자형 변환)
                    const cleanedData = rawData.map(row => {
                        // 공백 제거나 특수문자 대응을 위해 동적으로 키를 찾습니다.
                        const keys = Object.keys(row);
                        
                        const dateKey = keys.find(k => k.includes('거래일자'));
                        const aptKey = keys.find(k => k.includes('아파트명'));
                        const dongKey = keys.find(k => k.includes('법정동'));
                        const areaKey = keys.find(k => k.includes('전용면적'));
                        const floorKey = keys.find(k => k.includes('층'));
                        const priceKey = keys.find(k => k.includes('거래금액'));
                        const yearKey = keys.find(k => k.includes('건축년도'));

                        // 거래금액의 콤마 제거 후 숫자로 변환
                        const priceStr = row[priceKey] || '0';
                        const priceNum = parseInt(priceStr.replace(/,/g, ''), 10);

                        return {
                            date: row[dateKey] ? row[dateKey].trim() : '',
                            apt: row[aptKey] ? row[aptKey].trim() : '',
                            dong: row[dongKey] ? row[dongKey].trim() : '',
                            area: row[areaKey] ? row[areaKey].trim() : '',
                            floor: row[floorKey] ? row[floorKey].trim() : '',
                            price: isNaN(priceNum) ? 0 : priceNum,
                            year: row[yearKey] ? row[yearKey].trim() : ''
                        };
                    }).filter(item => item.price > 0 && item.date !== ''); // 유효한 데이터만 필터링

                    // 정제된 데이터로 화면 업데이트 진행
                    updateSummaryCards(cleanedData);
                    renderTable(cleanedData);
                    renderChart(cleanedData);
                    
                    document.getElementById('update-status').innerText = '최근 업데이트 완료';
                },
                error: function(err) {
                    console.error("CSV 파싱 에러:", err);
                    document.getElementById('update-status').innerText = '데이터 로딩 중 오류가 발생했습니다.';
                }
            });
        }

        // 요약 카드(상단 4개) 데이터 업데이트 함수
        function updateSummaryCards(data) {
            const totalCount = data.length;
            
            // 거래금액만 모은 배열 생성
            const prices = data.map(item => item.price);
            
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);
            const sumPrice = prices.reduce((acc, cur) => acc + cur, 0);
            const avgPrice = Math.round(sumPrice / totalCount);

            // 화면 요소에 값 입력
            document.getElementById('total-count').innerText = `${formatNumber(totalCount)} 건`;
            document.getElementById('avg-price').innerText = `${formatNumber(avgPrice)}`;
            document.getElementById('max-price').innerText = `${formatNumber(maxPrice)}`;
            document.getElementById('min-price').innerText = `${formatNumber(minPrice)}`;
        }

        // 거래 목록 테이블 렌더링 함수
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // 기존 내용 초기화

            // 날짜 최신순으로 정렬 (내림차순)
            const sortedData = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));

            sortedData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-blue-50/50 transition-colors duration-150';
                
                tr.innerHTML = `
                    <td class="p-3">${item.date}</td>
                    <td class="p-3 font-medium text-gray-800">${item.apt}</td>
                    <td class="p-3">${item.dong}</td>
                    <td class="p-3 text-right">${item.area}</td>
                    <td class="p-3 text-center">${item.floor}</td>
                    <td class="p-3 text-right font-bold text-blue-600">${formatNumber(item.price)}</td>
                    <td class="p-3 text-center">${item.year}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 월별 평균 거래가격 차트 렌더링 함수
        function renderChart(data) {
            // 월별로 데이터 그룹화
            const monthlyData = {};

            data.forEach(item => {
                // 'YYYY-MM-DD' 또는 'YYYY.MM.DD' 형식에서 년/월 추출 (앞에서 7자리)
                // 데이터 형식에 따라 수정이 필요할 수 있습니다. (예: 2023-10)
                let monthStr = '';
                if(item.date.includes('-')) {
                    monthStr = item.date.substring(0, 7);
                } else if(item.date.includes('.')) {
                    monthStr = item.date.substring(0, 7).replace(/\./g, '-');
                } else {
                    monthStr = item.date.substring(0, 7);
                }

                if(!monthlyData[monthStr]) {
                    monthlyData[monthStr] = { sum: 0, count: 0 };
                }
                monthlyData[monthStr].sum += item.price;
                monthlyData[monthStr].count += 1;
            });

            // 시간순으로 정렬하기 위해 키(년월) 추출 및 정렬
            const sortedMonths = Object.keys(monthlyData).sort();
            
            const chartLabels = sortedMonths;
            const chartValues = sortedMonths.map(month => {
                return Math.round(monthlyData[month].sum / monthlyData[month].count);
            });

            const ctx = document.getElementById('priceChart').getContext('2d');
            
            // 기존 차트가 있다면 파괴하고 새로 그림 (중복 렌더링 방지)
            if(myChart) {
                myChart.destroy();
            }

            // 차트 스타일 및 옵션 설정
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: '월별 평균 거래가격 (만원)',
                        data: chartValues,
                        borderColor: '#3b82f6', // 파란색 선
                        backgroundColor: 'rgba(59, 130, 246, 0.2)', // 반투명 파란색 배경
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#3b82f6',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.4 // 곡선 부드럽게
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false // 범례 숨김 (레이블이 명확하므로)
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            titleColor: '#1f2937',
                            bodyColor: '#1f2937',
                            borderColor: '#e5e7eb',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return formatNumber(context.parsed.y) + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                callback: function(value) {
                                    // Y축 숫자 축약 (예: 10,000)
                                    return formatNumber(value);
                                }
                            }
                        }
                    }
                }
            });
        }

        // 페이지 로드 시 대시보드 초기화 함수 실행
        window.onload = initDashboard;

    </script>
</body>
</html>
